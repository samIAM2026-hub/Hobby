<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页目录 · Directory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #ffffff;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --accent: #2563eb;
    --border: #e5e7eb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.3px; }
  header p { color: var(--muted); margin-top: 6px; font-size: .95rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 10px rgba(37,99,235,.12);
    transform: translateY(-2px);
  }
  .icon { font-size: 1.5rem; line-height: 1; }
  .meta h2 { font-size: 1rem; font-weight: 600; }
  .meta .sub { color: var(--muted); font-size: .8rem; margin-top: 2px; }
  footer { color: var(--muted); margin-top: 36px; font-size: .8rem; }
</style>
</head>

      </a>

      <a class="card" href="southpole/index.html">
        <div class="icon">🐧</div>

      </a>

      <a class="card" href="Market/Macro Trader html/index.html">

        <div class="meta"><h2>宏观交易 Macro</h2><div class="sub">行情研究与简报</div></div>

      <a class="card" href="Market/China Market/index.html">

      <a class="card" href="Market/Macro Trader html/pages/weekly_market_analysis_jun1_5_2026.html">

</body>
